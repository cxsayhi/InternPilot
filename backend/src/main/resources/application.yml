server:
  port: 8080

spring:
  application:
    name: internpilot-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/internpilot?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:internpilot}
    password: ${SPRING_DATASOURCE_PASSWORD:internpilot}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

internpilot:
  agent-service:
    base-url: ${AGENT_SERVICE_BASE_URL:http://localhost:8000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
